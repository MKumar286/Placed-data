<!DOCTYPE html>
<html>
<head>

<title>MGIT Placement Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BODY */

body{

font-family:Arial,sans-serif;

margin:0;
padding:20px;

background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c1c);

background-size:400% 400%;

animation:bgAnimation 15s ease infinite;

overflow-x:hidden;

}

/* ANIMATION */

@keyframes bgAnimation{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

/* HEADER SECTION */

.header-section{

background:linear-gradient(135deg,#001f4d,#003b8e,#0052cc);

padding:28px 20px;

border-radius:22px;

margin-bottom:22px;

text-align:center;

box-shadow:0 10px 25px rgba(0,0,0,0.35);

border:2px solid rgba(255,255,255,0.1);

}

.header-section h1{

margin:0;

font-size:42px;

font-weight:800;

color:#ffffff;

letter-spacing:1px;

}

.header-section h3{

margin-top:10px;

font-size:22px;

font-weight:600;

color:#ffffff;

}

/* STATS SECTION */

.stats{

display:flex;

gap:20px;

flex-wrap:wrap;

margin-bottom:22px;

}

/* STAT BOX */

.stat-box{

flex:1;

min-width:220px;

padding:22px;

border-radius:18px;

text-align:center;

color:white;

font-weight:bold;

box-shadow:0 8px 20px rgba(0,0,0,0.3);

}

/* DIFFERENT COLORS */

.stat-box:nth-child(1){

background:linear-gradient(135deg,#ff512f,#dd2476);

}

.stat-box:nth-child(2){

background:linear-gradient(135deg,#11998e,#38ef7d);

}

/* STAT TEXT */

.stat-title{

font-size:18px;

margin-bottom:10px;

}

.stat-value{

font-size:34px;

font-weight:bold;

}

/* FILTER SECTION */

.controls{

margin-bottom:20px;

display:flex;

flex-wrap:nowrap;

gap:10px;

overflow-x:auto;

overflow-y:hidden;

padding:15px;

border-radius:15px;

background:rgba(255,255,255,0.12);

backdrop-filter:blur(10px);

box-shadow:0 4px 15px rgba(0,0,0,0.2);

scroll-behavior:smooth;

}

/* SCROLLBAR */

.controls::-webkit-scrollbar{

height:7px;

}

.controls::-webkit-scrollbar-thumb{

background:linear-gradient(90deg,#00c6ff,#0072ff);

border-radius:10px;

}

/* INPUTS */

.controls input,
.controls select{

flex:0 0 auto;

padding:10px;

font-size:14px;

width:180px;

min-width:180px;

height:44px;

border-radius:8px;

border:1px solid rgba(255,255,255,0.25);

outline:none;

background:rgba(255,255,255,0.95);

}

/* TABLE CONTAINER */

.table-container{

overflow-x:auto;

overflow-y:hidden;

border-radius:18px;

box-shadow:0 8px 25px rgba(0,0,0,0.35);

background:white;

padding-bottom:6px;

}

/* TABLE SCROLLBAR */

.table-container::-webkit-scrollbar{

height:10px;

}

.table-container::-webkit-scrollbar-track{

background:#d9d9d9;

border-radius:10px;

}

.table-container::-webkit-scrollbar-thumb{

background:linear-gradient(90deg,#ff512f,#dd2476);

border-radius:10px;

}

/* TABLE */

table{

border-collapse:collapse;

min-width:1600px;

width:max-content;

background:white;

}

/* TABLE HEAD */

th{

background:linear-gradient(135deg,#141e30,#243b55);

color:white;

padding:14px;

font-size:15px;

}

/* TABLE CELLS */

th,td{

border:1px solid rgba(16,37,66,0.12);

padding:12px;

font-size:15px;

font-weight:500;

text-align:center;

white-space:nowrap;

}

/* ROW COLORS */

tr:nth-child(even){

background:#f5f9ff;

}

tr:nth-child(odd){

background:#ffffff;

}

tr:hover{

background:#dcecff;

transition:0.3s;

}

/* LINKS */

.link-btn{

background:linear-gradient(135deg,#141e30,#243b55);

color:white;

padding:6px 12px;

border-radius:6px;

text-decoration:none;

font-size:12px;

display:inline-block;

transition:0.3s;

}

.link-btn:hover{

transform:scale(1.05);

}

/* MOBILE VIEW */

@media(max-width:768px){

.header-section h1{

font-size:30px;

}

.header-section h3{

font-size:18px;

}

.controls{

padding:12px;

gap:8px;

}

.controls input,
.controls select{

width:160px;

min-width:160px;

height:42px;

font-size:14px;

}

.stats{

flex-direction:column;

}

}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header-section">

<h1>MGIT Placement Records</h1>

<h3>Academic Year 2025 - 2026</h3>

</div>

<!-- STATS -->

<div class="stats">

<div class="stat-box">

<div class="stat-title">Total Offers</div>

<div class="stat-value" id="totalOffers">0</div>

</div>

<div class="stat-box">

<div class="stat-title">Placed Students</div>

<div class="stat-value" id="placedStudents">0</div>

</div>

</div>

<!-- FILTERS -->

<div class="controls">

<input type="text" id="search" placeholder="Search student / roll / company">

<select id="batchFilter"><option value="">All Batches</option></select>

<select id="branchFilter"><option value="">All Branches</option></select>

<select id="companyFilter"><option value="">All Companies</option></select>

<select id="natureFilter"><option value="">Nature of the Company</option></select>

<select id="internFilter"><option value="">Internship Type</option></select>

<select id="genderFilter"><option value="">All Genders</option></select>

</div>

<!-- TABLE -->

<div class="table-container">

<table id="placementTable">

<thead></thead>

<tbody></tbody>

</table>

</div>

<!-- PAPAPARSE -->

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSlQ0WjFcZaI2eiKVtAqynVqs3H82MznXaV15n-qLjsDv6QL75g_7sQAhm0n6ZtiiDVKIB0MkuTNQ64/pub?gid=492329818&single=true&output=csv";

let allData=[];

let natureKey="";
let internKey="";

Papa.parse(csvURL,{

download:true,

header:true,

complete:function(results){

allData = results.data.filter(row => Object.values(row).join("").trim() !== "");

if(allData.length===0){

alert("No Data Loaded");

return;

}

let headers = Object.keys(allData[0]);

natureKey = headers.find(h => h.toLowerCase().includes("nature"));

internKey = headers.find(h => h.toLowerCase().includes("paid"));

buildTable(allData);

populateFilters(allData);

updateStats(allData);

}

});

/* BUILD TABLE */

function buildTable(data){

let thead=document.querySelector("#placementTable thead");

let tbody=document.querySelector("#placementTable tbody");

thead.innerHTML="";
tbody.innerHTML="";

if(data.length===0){

tbody.innerHTML="<tr><td colspan='20'>No Records Found</td></tr>";

return;

}

let headers=Object.keys(data[0]);

let tr=document.createElement("tr");

headers.forEach(h=>{

let th=document.createElement("th");

th.innerText=h;

tr.appendChild(th);

});

thead.appendChild(tr);

data.forEach(row=>{

let tr=document.createElement("tr");

headers.forEach(h=>{

let td=document.createElement("td");

let value=row[h]?row[h].toString().trim():"";

if(value.includes("http")){

let a=document.createElement("a");

a.href=value;

a.target="_blank";

a.className="link-btn";

if(h.toLowerCase().includes("intern")){

a.innerText="📄 Internship Letter";

}

else if(h.toLowerCase().includes("offer")){

a.innerText="📄 Offer Letter";

}

else{

a.innerText="📄 View";

}

td.appendChild(a);

}

else{

td.innerText=value;

}

tr.appendChild(td);

});

tbody.appendChild(tr);

});

}

/* FILTERS */

function populateFilters(data){

let batches=[...new Set(data.map(d=>d["Batch"]))];

let branches=[...new Set(data.map(d=>d["Branch"]))];

let companies=[...new Set(data.map(d=>d["Company Placed"]))];

let natures=[...new Set(data.map(d=>(d[natureKey]||"").trim()).filter(v=>v))];

let interns=[...new Set(data.map(d=>(d[internKey]||"").trim()).filter(v=>v))];

let genders=[...new Set(data.map(d=>(d["Gender"]||"").trim()).filter(v=>v))];

fillSelect("batchFilter",batches,"All Batches");

fillSelect("branchFilter",branches,"All Branches");

fillSelect("companyFilter",companies,"All Companies");

fillSelect("natureFilter",natures,"Nature of the Company");

fillSelect("internFilter",interns,"Internship Type");

fillSelect("genderFilter",genders,"All Genders");

}

/* FILL SELECT */

function fillSelect(id,data,defaultText){

let select=document.getElementById(id);

select.innerHTML=`<option value="">${defaultText}</option>`;

data.sort().forEach(v=>{

select.add(new Option(v,v));

});

}

/* STATS */

function updateStats(data){

document.getElementById("totalOffers").innerText=data.length;

let uniqueStudents=new Set();

data.forEach(row=>{

uniqueStudents.add(row["Roll Number"]);

});

document.getElementById("placedStudents").innerText=uniqueStudents.size;

}

/* APPLY FILTERS */

function applyFilters(){

let search=document.getElementById("search").value.toLowerCase();

let batch=document.getElementById("batchFilter").value;

let branch=document.getElementById("branchFilter").value;

let company=document.getElementById("companyFilter").value;

let nature=document.getElementById("natureFilter").value;

let intern=document.getElementById("internFilter").value;

let gender=document.getElementById("genderFilter").value;

let filtered=allData.filter(row=>{

let text=JSON.stringify(row).toLowerCase();

return text.includes(search) &&

(batch=="" || row["Batch"]==batch) &&

(branch=="" || row["Branch"]==branch) &&

(company=="" || row["Company Placed"]==company) &&

(nature=="" || (row[natureKey]||"").trim()==nature) &&

(intern=="" || (row[internKey]||"").trim()==intern) &&

(gender=="" || (row["Gender"]||"").trim()==gender);

});

buildTable(filtered);

updateStats(filtered);

}

/* EVENTS */

document.getElementById("search").addEventListener("keyup",applyFilters);

document.getElementById("batchFilter").addEventListener("change",applyFilters);

document.getElementById("branchFilter").addEventListener("change",applyFilters);

document.getElementById("companyFilter").addEventListener("change",applyFilters);

document.getElementById("natureFilter").addEventListener("change",applyFilters);

document.getElementById("internFilter").addEventListener("change",applyFilters);

document.getElementById("genderFilter").addEventListener("change",applyFilters);

</script>

</body>
</html>
