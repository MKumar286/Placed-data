<!DOCTYPE html>
<html>
<head>

<title>MGIT Placement Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
padding:20px;
min-height:100vh;
background: linear-gradient(-45deg, #1e3c72, #2a5298, #0f2027, #203a43);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
}

/* Animated Background */

@keyframes gradientBG{
0%{
background-position:0% 50%;
}
50%{
background-position:100% 50%;
}
100%{
background-position:0% 50%;
}
}

/* Gradient Heading */

h1{
text-align:center;
font-size:38px;
margin-bottom:10px;
font-weight:bold;

background:linear-gradient(
90deg,
#ff6a00,
#ee0979,
#00c6ff,
#0072ff
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

background-size:300% 300%;
animation:headingGlow 6s ease infinite;

text-shadow:0 3px 10px rgba(0,0,0,0.2);
}

h3{
text-align:center;
margin-bottom:25px;
font-weight:bold;
font-size:22px;

background:linear-gradient(
90deg,
#00f260,
#0575e6,
#8e2de2,
#ff512f
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

background-size:300% 300%;
animation:headingGlow 8s ease infinite;
}

/* Heading Animation */

@keyframes headingGlow{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

/* Stats */

.stats{
margin:15px 0;
font-weight:bold;
font-size:18px;
color:white;
background:rgba(255,255,255,0.12);
padding:15px;
border-radius:14px;
backdrop-filter:blur(10px);
box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

/* Controls */

.controls{
margin-bottom:20px;
display:flex;
flex-wrap:wrap;
gap:12px;
background:rgba(255,255,255,0.12);
padding:18px;
border-radius:14px;
backdrop-filter:blur(10px);
box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

input, select{
padding:10px 12px;
font-size:15px;
min-width:180px;
height:44px;
border-radius:8px;
border:none;
outline:none;
background:rgba(255,255,255,0.92);
transition:0.3s;
}

input:focus,
select:focus{
transform:scale(1.02);
box-shadow:0 0 10px rgba(255,255,255,0.5);
}

/* Table */

.table-container{
overflow-x:auto;
border-radius:14px;
box-shadow:0 5px 20px rgba(0,0,0,0.25);
}

table{
border-collapse:collapse;
width:100%;
background:rgba(255,255,255,0.95);
overflow:hidden;
}

th,td{
border:1px solid #dcdcdc;
padding:10px;
font-size:13px;
text-align:center;
white-space:nowrap;
}

th{
background:#102542;
color:white;
position:sticky;
top:0;
z-index:2;
}

tr:nth-child(even){
background:#f4f6f9;
}

tr:hover{
background:#dfefff;
transition:0.3s;
}

/* Buttons */

.link-btn{
background:#102542;
color:white;
padding:6px 12px;
border-radius:6px;
text-decoration:none;
font-size:12px;
display:inline-block;
transition:0.3s;
}

.link-btn:hover{
background:#1d4e89;
transform:scale(1.05);
}

/* Mobile */

@media(max-width:768px){

h1{
font-size:28px;
}

.controls{
flex-direction:column;
}

input,select{
width:100%;
}

.stats{
font-size:16px;
text-align:center;
}

}

</style>

</head>

<body>

<h1>MGIT Placement Records</h1>
<h3>Academic Year 2025 - 2026</h3>

<div class="stats">
Total Offers :
<span id="totalOffers">0</span>
|
Total Placed Students :
<span id="placedStudents">0</span>
</div>

<div class="controls">

<input type="text" id="search" placeholder="Search student / roll / company">

<select id="batchFilter">
<option value="">All Batches</option>
</select>

<select id="branchFilter">
<option value="">All Branches</option>
</select>

<select id="companyFilter">
<option value="">All Companies</option>
</select>

<select id="natureFilter">
<option value="">Nature of the Company</option>
</select>

<select id="internFilter">
<option value="">Internship Type</option>
</select>

<select id="genderFilter">
<option value="">All Genders</option>
</select>

</div>

<div class="table-container">
<table id="placementTable">
<thead></thead>
<tbody></tbody>
</table>
</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSlQ0WjFcZaI2eiKVtAqynVqs3H82MznXaV15n-qLjsDv6QL75g_7sQAhm0n6ZtiiDVKIB0MkuTNQ64/pub?gid=492329818&single=true&output=csv";

let allData=[];
let natureKey="";
let internKey="";

Papa.parse(csvURL,{
download:true,
header:true,

complete:function(results){

allData = results.data.filter(row =>
Object.values(row).join("").trim() !== ""
);

let headers = Object.keys(allData[0]);

natureKey = headers.find(h =>
h.toLowerCase().includes("nature")
);

internKey = headers.find(h =>
h.toLowerCase().includes("paid")
);

buildTable(allData);
populateFilters(allData);
updateStats(allData);

}

});

function buildTable(data){

let thead=document.querySelector("#placementTable thead");
let tbody=document.querySelector("#placementTable tbody");

thead.innerHTML="";
tbody.innerHTML="";

if(data.length===0){

tbody.innerHTML=
"<tr><td colspan='20'>No Records Found</td></tr>";

return;
}

let headers=Object.keys(data[0]);

let tr=document.createElement("tr");

headers.forEach(h=>{

let th=document.createElement("th");
th.innerText=h;
tr.appendChild(th);

});

thead.appendChild(tr);

data.forEach(row=>{

let tr=document.createElement("tr");

headers.forEach(h=>{

let td=document.createElement("td");

let value = row[h] ? row[h].toString().trim() : "";

if(value.includes("http")){

let a = document.createElement("a");

a.href = value;
a.target = "_blank";
a.className = "link-btn";

if(h.toLowerCase().includes("intern")){

a.innerText = "📄 Internship Letter";

}
else if(h.toLowerCase().includes("offer")){

a.innerText = "📄 Offer Letter";

}
else{

a.innerText = "📄 View";

}

td.appendChild(a);

}
else{

td.innerText = value;

}

tr.appendChild(td);

});

tbody.appendChild(tr);

});

}

function populateFilters(data){

let batches=[...new Set(data.map(d=>d["Batch"]))];

let branches=[...new Set(data.map(d=>d["Branch"]))];

let companies=[...new Set(data.map(d=>d["Company Placed"]))];

let natures=[...new Set(
data.map(d => (d[natureKey] || "").trim())
.filter(v=>v)
)];

let interns=[...new Set(
data.map(d => (d[internKey] || "").trim())
.filter(v=>v)
)];

let genders=[...new Set(
data.map(d => (d["Gender"] || "").trim())
.filter(v=>v)
)];

let batchSelect=document.getElementById("batchFilter");
let branchSelect=document.getElementById("branchFilter");
let companySelect=document.getElementById("companyFilter");
let natureSelect=document.getElementById("natureFilter");
let internSelect=document.getElementById("internFilter");
let genderSelect=document.getElementById("genderFilter");

batchSelect.innerHTML='<option value="">All Batches</option>';
branchSelect.innerHTML='<option value="">All Branches</option>';
companySelect.innerHTML='<option value="">All Companies</option>';
natureSelect.innerHTML='<option value="">Nature of the Company</option>';
internSelect.innerHTML='<option value="">Internship Type</option>';
genderSelect.innerHTML='<option value="">All Genders</option>';

batches.sort().forEach(b=>
batchSelect.add(new Option(b,b))
);

branches.sort().forEach(b=>
branchSelect.add(new Option(b,b))
);

companies.sort().forEach(c=>
companySelect.add(new Option(c,c))
);

natures.sort().forEach(n=>
natureSelect.add(new Option(n,n))
);

interns.sort().forEach(i=>
internSelect.add(new Option(i,i))
);

genders.sort().forEach(g=>
genderSelect.add(new Option(g,g))
);

}

function updateStats(data){

document.getElementById("totalOffers").innerText=data.length;

let uniqueStudents=new Set();

data.forEach(row=>{

uniqueStudents.add(row["Roll Number"]);

});

document.getElementById("placedStudents").innerText=uniqueStudents.size;

}

function applyFilters(){

let search=document.getElementById("search").value.toLowerCase();

let batch=document.getElementById("batchFilter").value;

let branch=document.getElementById("branchFilter").value;

let company=document.getElementById("companyFilter").value;

let nature=document.getElementById("natureFilter").value;

let intern=document.getElementById("internFilter").value;

let gender=document.getElementById("genderFilter").value;

let filtered=allData.filter(row=>{

let text=JSON.stringify(row).toLowerCase();

return text.includes(search) &&

(batch=="" || row["Batch"]==batch) &&

(branch=="" || row["Branch"]==branch) &&

(company=="" || row["Company Placed"]==company) &&

(nature=="" || (row[natureKey] || "").trim()==nature) &&

(intern=="" || (row[internKey] || "").trim()==intern) &&

(gender=="" || (row["Gender"] || "").trim()==gender);

});

buildTable(filtered);
updateStats(filtered);

}

document.getElementById("search")
.addEventListener("keyup",applyFilters);

document.getElementById("batchFilter")
.addEventListener("change",applyFilters);

document.getElementById("branchFilter")
.addEventListener("change",applyFilters);

document.getElementById("companyFilter")
.addEventListener("change",applyFilters);

document.getElementById("natureFilter")
.addEventListener("change",applyFilters);

document.getElementById("internFilter")
.addEventListener("change",applyFilters);

document.getElementById("genderFilter")
.addEventListener("change",applyFilters);

</script>

</body>
</html>
